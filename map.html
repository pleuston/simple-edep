<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simple-edep · Geodata</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="vendor/leaflet/MarkerCluster.css" />
    <link rel="stylesheet" href="vendor/leaflet/MarkerCluster.Default.css" />
    <script src="auth.js"></script>
  </head>
  <body class="map-page">
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="brand-home">simple<span class="brand-edep">EDEP</span></a>
      </div>
      <nav class="sitenav sitenav-editor">
        <a href="catalog.html" class="sitenav-link">Inscriptions</a>
        <a href="map.html" class="sitenav-link active">Geodata</a>
        <a href="people.html" class="sitenav-link">People</a>
        <a href="photos.html" class="sitenav-link">Photos</a>
        <a href="bibliography.html" class="sitenav-link">Bibliography</a>
      </nav>
      <div class="topbar-right">
      <nav class="sitenav-right">
        <a href="favorites.html" class="sitenav-link sitenav-icon" aria-label="Favorites" title="Favorites"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></a>
        <a href="logs.html" class="sitenav-link">Log</a>
        <a href="about.html" class="sitenav-link">About</a>
        <a href="docs.html" class="sitenav-link">Guide</a>
      </nav>
        <div class="lang-box"><span>Language</span>
          <select aria-label="Interface language"><option>English</option></select>
        </div>
        <a class="account-link" data-account href="login.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8.5" r="3.5"/><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5"/></svg>
          <span class="account-label">Login</span>
        </a>
      </div>
    </header>

    <div class="map-layout">
      <!-- left: filters -->
      <aside class="map-facets" id="map-facets">
        <label class="facet">Search<input id="m-search" type="search" placeholder="title, place, type…" /></label>
        <label class="facet">Province<select id="m-province"><option value="">All</option></select></label>
        <label class="facet">Country<select id="m-country"><option value="">All</option></select></label>
        <label class="facet">Text type<select id="m-textType"><option value="">All</option></select></label>
        <label class="facet facet-date">Dating<span>
          <input id="m-from" class="yr" type="number" placeholder="from" />
          –
          <input id="m-to" class="yr" type="number" placeholder="to" />
        </span></label>
        <button id="m-reset" class="btn small" type="button">Reset filters</button>
      </aside>

      <!-- middle: paginated entry list -->
      <div class="map-list-col">
        <div class="map-list-head">
          <div class="register-pager" id="m-pager"></div>
        </div>
        <div class="site-notice site-notice-map">
          29 776 ancient find spots from <code>edh_data_geo.csv</code> — click a site to see its inscriptions on the map and in the list.
          Updated data reaches the CDN within ~12 h.
        </div>
        <div class="map-list-body" id="m-list">
          <div class="catalog-loading">Loading…</div>
        </div>
      </div>

      <!-- right: the map -->
      <div id="map"></div>
    </div>

    <script src="collections.js"></script>
    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="vendor/leaflet/leaflet.markercluster.js"></script>
    <script src="map.js"></script>
  </body>
</html>
