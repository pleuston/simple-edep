<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simple-edep · Editor</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js"></script>
    <!-- Leiden+ / EpiDoc editor web component (self-registers; vendored, no CDN) -->
    <script type="module" src="vendor/jinn-codemirror/jinn-codemirror-bundle.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="brand-home">simple-edep</a>
        <span class="brand-sep">·</span>
        <span>Roman inscription editor</span>
      </div>
      <nav class="sitenav sitenav-editor">
        <a href="catalog.html" class="sitenav-link">Inscriptions</a>
        <a href="map.html" class="sitenav-link">Geodata</a>
        <a href="people.html" class="sitenav-link">People</a>
        <a href="about.html" class="sitenav-link">About</a>
        <a href="docs.html" class="sitenav-link">Instructions</a>
      </nav>
      <div class="controls">
        <button id="btn-example"  type="button" class="btn">Load example</button>
        <button id="btn-reset"    type="button" class="btn">Reset</button>
        <button id="btn-copy"        type="button" class="btn primary">① Copy XML</button>
        <button id="btn-save-github" type="button" class="btn primary">② Save to GitHub</button>
        <button id="btn-gh-settings" type="button" class="btn btn-icon" title="GitHub settings" aria-label="GitHub settings">⚙</button>
        <button id="btn-download" type="button" class="btn">Download .xml</button>
        <button data-workflow-modal type="button" class="btn">? How to</button>
        <button data-signout type="button" class="btn small">Sign out</button>
      </div>
    </header>

    <div class="editor-hint">
      <span class="step">① Fill the form &amp; type the text in the Leiden+ editor</span>
      <span class="arrow">→</span>
      <span class="step">② <strong>Save to GitHub</strong> — commits to <code>records/</code></span>
      <span class="hint-or">or</span>
      <span class="step">② <strong>Copy XML</strong> / Download</span>
      <span class="step save-target-wrap" style="margin-left:auto">Saving to <code id="save-target">…</code></span>
    </div>

    <main class="layout">
      <section id="form" class="pane form" aria-label="metadata form"></section>
      <section class="pane preview" aria-label="EpiDoc output">
        <div class="preview-head">
          <div class="view-toggle">
            <button class="view-btn active" id="btn-view-xml" type="button">XML</button>
            <button class="view-btn" id="btn-view-read" type="button">Reading</button>
          </div>
          <span id="validity" class="validity"></span>
        </div>
        <div id="preview-read" class="hp-pane" style="display:none"></div>
        <pre id="preview-xml"><code id="out"></code></pre>
      </section>
    </main>

    <div id="toast" role="status" aria-live="polite"></div>

    <script src="vocab.js"></script>
    <script src="generator.js"></script>
    <script src="reading.js"></script>
    <script src="app.js"></script>
    <script src="github.js"></script>
    <script src="modal.js"></script>
  </body>
</html>
