<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simple-edep · Inscriptions</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="brand-home">simple-edep</a>
      </div>
      <nav class="sitenav sitenav-editor">
        <a href="catalog.html" class="sitenav-link active">Inscriptions</a>
        <a href="map.html" class="sitenav-link">Geodata</a>
        <a href="people.html" class="sitenav-link">People</a>
        <a href="bibliography.html" class="sitenav-link">Bibliography</a>
        <a href="about.html" class="sitenav-link">About</a>
        <a href="docs.html" class="sitenav-link">Instructions</a>
      </nav>
      <div class="topbar-right">
        <div class="lang-box"><span>Language</span>
          <select aria-label="Interface language"><option>English</option></select>
        </div>
        <a class="account-link" data-account href="login.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8.5" r="3.5"/><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5"/></svg>
          <span class="account-label">Login</span>
        </a>
      </div>
    </header>

    <div class="catalog-wrap">
      <h1 class="page-title">Inscriptions</h1>
      <div class="register-controls">
        <label class="field-col">Sort by
          <select id="cat-sort">
            <option value="title">Title</option>
            <option value="date">Date</option>
            <option value="place">Place</option>
          </select>
        </label>
        <label class="field-col">Search
          <input id="cat-search" type="search" placeholder="title, place, type…" />
        </label>
      </div>
      <a class="btn-new" href="editor.html"><span class="plus">+</span> New inscription</a>
      <div class="register-pager" id="cat-pager"></div>
      <div id="cat-list"><div class="catalog-loading">Loading…</div></div>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="data.js"></script>
    <script src="catalog.js"></script>
  </body>
</html>
