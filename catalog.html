<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simple-edep · Catalogue</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="brand-home">simple-edep</a>
        <span class="brand-sep">·</span>
        <span>Catalogue</span>
      </div>
      <nav class="sitenav sitenav-editor">
        <a href="catalog.html" class="sitenav-link active">Catalogue</a>
        <a href="map.html" class="sitenav-link">Map</a>
        <a href="editor.html" class="sitenav-link">Editor</a>
        <a href="docs.html" class="sitenav-link">Docs</a>
      </nav>
      <div class="controls">
        <a href="editor.html" class="btn primary">+ New inscription</a>
        <button data-signout type="button" class="btn small">Sign in</button>
      </div>
    </header>

    <div class="catalog-wrap">
      <div class="catalog-head">
        <h2>Inscriptions <span id="cat-count" class="catalog-meta"></span></h2>
        <div class="catalog-head-actions">
          <input id="cat-search" class="catalog-searchbox" type="search" placeholder="Search title, place, type…" />
        </div>
      </div>
      <div id="cat-list"><div class="catalog-loading">Loading…</div></div>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="data.js"></script>
    <script src="catalog.js"></script>
  </body>
</html>
