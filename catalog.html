<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>simple-edep · Inscriptions</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <script src="auth.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="brand-home">simple-edep</a>
      </div>
      <nav class="sitenav sitenav-editor">
        <a href="catalog.html" class="sitenav-link active">Inscriptions</a>
        <a href="map.html" class="sitenav-link">Geodata</a>
        <a href="people.html" class="sitenav-link">People</a>
        <a href="photos.html" class="sitenav-link">Photos</a>
        <a href="bibliography.html" class="sitenav-link">Bibliography</a>
        <a href="about.html" class="sitenav-link">About</a>
        <a href="docs.html" class="sitenav-link">Instructions</a>
      </nav>
      <div class="topbar-right">
        <div class="lang-box"><span>Language</span>
          <select aria-label="Interface language"><option>English</option></select>
        </div>
        <a class="account-link" data-account href="login.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8.5" r="3.5"/><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5"/></svg>
          <span class="account-label">Login</span>
        </a>
      </div>
    </header>

    <div class="catalog-wrap with-facets">
      <aside class="facet-side" id="cat-facets">
        <div class="facet collections-picker" id="cat-collections">
          <span class="facet-label">Collections</span>
          <label class="col-check"><input type="checkbox" data-col="edh" /> <span class="col-dot col-edh"></span> EDH</label>
          <label class="col-check"><input type="checkbox" data-col="isic" /> <span class="col-dot col-isic"></span> I.Sicily</label>
          <label class="col-check"><input type="checkbox" data-col="local" /> <span class="col-dot col-local"></span> My records</label>
          <label class="col-check reconcile"><input type="checkbox" id="c-reconcile" /> Reconcile duplicates</label>
        </div>
        <label class="facet">Search<input id="cat-search" type="search" placeholder="title, place, type…" /></label>
        <label class="facet">Sort by
          <select id="cat-sort">
            <option value="title">Title</option>
            <option value="date">Date</option>
            <option value="place">Place</option>
          </select>
        </label>
        <label class="facet">Province<select id="f-province"><option value="">All</option></select></label>
        <label class="facet">Country<select id="f-country"><option value="">All</option></select></label>
        <label class="facet">Text type<select id="f-textType"><option value="">All</option></select></label>
        <label class="facet">Object type<select id="f-objectType"><option value="">All</option></select></label>
        <label class="facet">Material<select id="f-material"><option value="">All</option></select></label>
        <label class="facet facet-date">Dating<span><input id="f-from" class="yr" type="number" placeholder="from" /> – <input id="f-to" class="yr" type="number" placeholder="to" /></span></label>
        <label class="facet facet-check"><input id="f-photo" type="checkbox" /> with photo</label>
        <button id="f-reset" class="btn small" type="button">Reset filters</button>
      </aside>
      <div class="catalog-main">
        <div class="register-head">
          <a class="btn-new" href="editor.html"><span class="plus">+</span> New inscription</a>
          <div class="register-pager" id="cat-pager"></div>
        </div>
        <div id="cat-list"><div class="catalog-loading">Loading…</div></div>
      </div>
    </div>

    <aside class="record-panel" id="rec-panel" aria-hidden="true">
      <div class="record-panel-head">
        <span class="record-panel-id" id="rp-id"></span>
        <a class="btn small" id="rp-full" href="#" target="_blank">Open full ↗</a>
        <button class="btn small rp-close" id="rp-close" type="button" aria-label="Close panel">✕</button>
      </div>
      <div class="record-panel-body">
        <div id="rp-image" class="rp-image"></div>
        <div id="rp-thumbs" class="iiif-thumbs"></div>
        <div id="rp-credit" class="iiif-credit"></div>
        <div id="rp-map" class="rp-map"></div>
        <div id="rp-reading" class="rp-reading"></div>
      </div>
    </aside>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="collections.js"></script>
    <script src="reading.js"></script>
    <script src="vendor/openseadragon/openseadragon.min.js"></script>
    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="recordview.js"></script>
    <script src="panel.js"></script>
    <script src="data.js"></script>
    <script src="catalog.js"></script>
  </body>
</html>
